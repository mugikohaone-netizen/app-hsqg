<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入善町 まちの魅力手帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F7F1E4;
    --paper: #FFFDF7;
    --ink: #3E3227;
    --ink-soft: #6B5D4F;
    --sea: #4C7FA6;
    --sea-deep: #2F5C7E;
    --leaf: #5C8A52;
    --leaf-deep: #3F6636;
    --melon: #D6483F;
    --mustard: #E0A945;
    --line: #E3D8C2;
    --shadow: 0 10px 28px rgba(62,50,39,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }
  h1,h2,h3, .display{
    font-family:'Kaisei Decol', serif;
    letter-spacing:.02em;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    width:100%;
    max-width:640px;
    margin:0 auto;
    overflow:hidden;
  }
  .hero img{
    width:100%;
    display:block;
  }
  .hero::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:38%;
    background:linear-gradient(to bottom, rgba(247,241,228,0) 0%, rgba(247,241,228,0.96) 88%);
    pointer-events:none;
  }
  .hero-caption{
    position:absolute;
    left:0;right:0;bottom:14px;
    text-align:center;
    z-index:2;
    padding:0 20px;
  }
  .hero-caption .eyebrow{
    display:inline-block;
    font-size:12px;
    letter-spacing:.18em;
    color:var(--sea-deep);
    background:rgba(255,253,247,0.9);
    border:1px solid var(--line);
    border-radius:20px;
    padding:4px 14px;
    margin-bottom:8px;
  }
  .hero-caption p{
    margin:0;
    font-size:14px;
    color:var(--ink-soft);
  }

  /* ---------- WRAP ---------- */
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}

  /* ---------- FILTER BAR ---------- */
  .filterbar{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--bg);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
    max-width:640px;
    margin:0 auto;
  }
  .search-row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  .search-row input{
    flex:1;
    min-width:0;
    height:44px;
    box-sizing:border-box;
    border:1.5px solid var(--line);
    background:var(--paper);
    border-radius:14px;
    padding:0 14px;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    outline:none;
  }
  .search-row input:focus{border-color:var(--sea);}
  .season-select{
    -webkit-appearance:none;
    appearance:none;
    border:1.5px solid var(--line);
    background:var(--paper) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0L5 6L10 0Z" fill="%236B5D4F"/></svg>') no-repeat right 12px center;
    border-radius:14px;
    padding:0 26px 0 14px;
    height:44px;
    line-height:44px;
    font-size:13px;
    font-family:inherit;
    color:var(--ink);
    flex:0 0 auto;
  }
  .chip-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
    scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:6px;
    padding:7px 13px 7px 8px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper);
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    cursor:pointer;
    transition:.18s ease;
    white-space:nowrap;
  }
  .chip .badge{
    width:22px;height:22px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    background:var(--bg);
  }
  .chip.active{
    border-color:transparent;
    color:#fff;
    background:var(--theme-color, var(--sea));
    box-shadow:var(--shadow);
  }
  .chip.active .badge{background:rgba(255,255,255,0.28);}

  /* ---------- SECTION HEADERS ---------- */
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin:26px 0 12px;
  }
  .section-head h2{
    font-size:19px;
    margin:0;
    color:var(--ink);
  }
  .section-head .count{
    font-size:12px;
    color:var(--ink-soft);
  }

  /* ---------- PICK CARD ---------- */
  .pick{
    display:block;
    position:relative;
    border-radius:20px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    background:var(--paper);
    text-decoration:none;
    color:inherit;
    cursor:pointer;
  }
  .pick .pick-img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
  }
  .pick .pick-ribbon{
    position:absolute;
    top:12px;left:12px;
    background:var(--melon);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:5px 12px;
    border-radius:999px;
    letter-spacing:.05em;
    box-shadow:0 4px 10px rgba(214,72,63,0.35);
  }
  .pick-body{padding:16px 18px 18px;}
  .pick-body h3{
    font-size:18px;
    margin:0 0 6px;
    line-height:1.5;
  }
  .pick-body p{
    font-size:13px;
    color:var(--ink-soft);
    line-height:1.7;
    margin:0 0 10px;
  }
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{
    font-size:11px;
    padding:3px 10px;
    border-radius:999px;
    background:var(--bg);
    color:var(--ink-soft);
    border:1px solid var(--line);
  }

  /* ---------- GRID ---------- */
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .card{
    background:var(--paper);
    border-radius:16px;
    border:1px solid var(--line);
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    opacity:0;
    transform:translateY(10px);
    animation:riseIn .5s ease forwards;
  }
  @keyframes riseIn{to{opacity:1;transform:none;}}
  .card .thumb-wrap{position:relative;}
  .card img{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    display:block;
  }
  .card .badge{
    position:absolute;
    top:8px;left:8px;
    width:28px;height:28px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    background:var(--paper);
    box-shadow:0 3px 8px rgba(0,0,0,0.18);
  }
  .card .season-tag{
    position:absolute;
    top:8px;right:8px;
    font-size:10px;
    background:rgba(62,50,39,0.62);
    color:#fff;
    padding:2px 8px;
    border-radius:999px;
  }
  .card .cbody{padding:10px 11px 12px;}
  .card h4{
    font-size:13.5px;
    margin:0 0 6px;
    line-height:1.5;
    font-weight:700;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card .area{
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    gap:3px;
  }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
  }
  .empty .icon{font-size:34px;margin-bottom:10px;}
  .empty h3{font-size:15px;margin:0 0 6px;color:var(--ink);}
  .empty p{font-size:13px;margin:0;line-height:1.7;}

  /* ---------- MODAL ---------- */
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(62,50,39,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--paper);
    width:100%;
    max-width:640px;
    max-height:86vh;
    overflow-y:auto;
    border-radius:22px 22px 0 0;
    animation:slideUp .28s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:none;opacity:1;}}
  .modal img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
  .modal-inner{padding:20px 22px 28px;}
  .modal-close{
    position:sticky;
    top:12px;left:calc(100% - 46px);
    width:34px;height:34px;
    background:rgba(255,253,247,0.92);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    border:1px solid var(--line);
    cursor:pointer;
    margin-bottom:-40px;
  }
  .modal-inner h3{font-size:20px;margin:14px 0 10px;line-height:1.5;}
  .modal-inner .tag-row{margin-bottom:14px;}
  .modal-inner .excerpt{font-size:14px;line-height:1.9;color:var(--ink-soft);margin-bottom:20px;}
  .modal-inner .author-row{
    display:flex;align-items:center;gap:8px;
    font-size:12.5px;color:var(--ink-soft);
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px dashed var(--line);
  }
  .modal-inner .author-row .dot{width:6px;height:6px;border-radius:50%;background:var(--melon);}
  .read-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;
    background:var(--sea-deep);
    color:#fff;
    border:none;
    padding:15px;
    border-radius:14px;
    font-size:14.5px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0 8px 18px rgba(47,92,126,0.28);
  }

  footer{
    max-width:640px;margin:36px auto 0;padding:20px 16px 0;
    border-top:1px solid var(--line);
    text-align:center;
  }
  footer p{font-size:11.5px;color:var(--ink-soft);line-height:1.8;margin:4px 0;}
</style>

/* ---------------- state ---------------- */
let activeTheme = "all";
let activeSeason = "all";
let keyword = "";

/* ---------------- 今月のおすすめ ----------------
   実際の月から季節を判定し、その季節にぴったりの記事を1本選ぶ。
   同じ季節の記事が複数あれば新しい順、なければ「通年」記事、
   それも無ければ最初の記事にフォールバック。
------------------------------------------------- */
const MONTH_NAMES = ["","1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
function seasonOfMonth(m){
  if([3,4,5].includes(m)) return "spring";
  if([6,7,8].includes(m)) return "summer";
  if([9,10,11].includes(m)) return "autumn";
  return "winter";
}
function getMonthlyPick(){
  const now = new Date();
  const month = now.getMonth()+1;
  const season = seasonOfMonth(month);
  let candidates = ARTICLES.filter(a=>a.season===season);
  if(candidates.length===0) candidates = ARTICLES.filter(a=>a.season==="year");
  if(candidates.length===0) candidates = ARTICLES;
  return { article:candidates[0], month, season };
}

/* ---------------- render: theme chips ---------------- */
const chipRow = document.getElementById("themeChips");
function renderChips(){
  let html = `<div class="chip active" data-theme="all" style="--theme-color:#3E3227"><span class="badge">🗺️</span>すべて</div>`;
  for(const key in THEMES){
    const t = THEMES[key];
    html += `<div class="chip" data-theme="${key}" style="--theme-color:${t.color}"><span class="badge">${t.icon}</span>${t.label}</div>`;
  }
  chipRow.innerHTML = html;
  chipRow.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      activeTheme = chip.dataset.theme;
      chipRow.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      render();
    });
  });
}

document.getElementById("seasonSelect").addEventListener("change", e=>{
  activeSeason = e.target.value;
  render();
});
document.getElementById("searchInput").addEventListener("input", e=>{
  keyword = e.target.value.trim();
  render();
});

/* ---------------- filtering ---------------- */
function filterArticles(){
  return ARTICLES.filter(a=>{
    if(activeTheme !== "all" && !a.themes.includes(activeTheme)) return false;
    if(activeSeason !== "all" && a.season !== activeSeason) return false;
    if(keyword){
      const hay = (a.title + a.excerpt + a.area).toLowerCase();
      if(!hay.includes(keyword.toLowerCase())) return false;
    }
    return true;
  });
}

function tagsHtml(a){
  return a.themes.map(k=>`<span class="tag">${THEMES[k].icon} ${THEMES[k].label}</span>`).join("")
    + `<span class="tag">${SEASON_LABEL[a.season]}</span>`
    + `<span class="tag">📍 ${a.area}</span>`;
}

/* ---------------- render: pick + grid ---------------- */
function render(){
  const list = filterArticles();
  const pickEl = document.getElementById("pickSection");
  const grid = document.getElementById("articleGrid");
  const empty = document.getElementById("emptyState");
  const count = document.getElementById("resultCount");

  count.textContent = list.length + "件";

  // 今月のおすすめは絞り込み条件に関係なく、常に「今」に合った1本を出す
  const { article: pick, month } = getMonthlyPick();
  if(pick){
    pickEl.innerHTML = `
      <div class="section-head" style="margin-top:6px;">
        <h2>今月のおすすめ</h2>
        <span class="count">${MONTH_NAMES[month]}の入善町にぴったりの1本</span>
      </div>
      <div class="pick" data-id="${pick.id}">
        <div style="position:relative;">
          <img class="pick-img" src="${pick.image}" alt="">
          <span class="pick-ribbon">${MONTH_NAMES[month]}のおすすめ</span>
        </div>
        <div class="pick-body">
          <h3>${pick.title}</h3>
          <p>${pick.excerpt}</p>
          <div class="tag-row">${tagsHtml(pick)}</div>
        </div>
      </div>`;
    pickEl.querySelector(".pick").addEventListener("click", ()=>openModal(pick.id));
  } else {
    pickEl.innerHTML = "";
  }

  // 一覧側は絞り込み結果から「今月のおすすめ」と重複する記事だけ外す
  const rest = list.filter(a=>a.id !== (pick && pick.id));
  if(rest.length === 0){
    grid.innerHTML = "";
    empty.style.display = list.length === 0 ? "block" : "none";
  } else {
    empty.style.display = "none";
    grid.innerHTML = rest.map((a,i)=>`
      <div class="card" data-id="${a.id}" style="animation-delay:${i*0.05}s">
        <div class="thumb-wrap">
          <img src="${a.image}" alt="">
          <span class="badge">${THEMES[a.themes[0]].icon}</span>
          <span class="season-tag">${SEASON_LABEL[a.season]}</span>
        </div>
        <div class="cbody">
          <h4>${a.title}</h4>
          <div class="area">📍 ${a.area}</div>
        </div>
      </div>`).join("");
    grid.querySelectorAll(".card").forEach(c=>{
      c.addEventListener("click", ()=>openModal(c.dataset.id));
    });
  }
  if(list.length === 0){ empty.style.display = "block"; }
}

/* ---------------- modal ---------------- */
const modalBg = document.getElementById("modalBg");
const modalBox = document.getElementById("modalBox");

function openModal(id){
  const a = ARTICLES.find(x=>x.id===id);
  if(!a) return;
  modalBox.innerHTML = `
    <img src="${a.image}" alt="">
    <div class="modal-inner">
      <div class="modal-close" id="closeBtn">✕</div>
      <h3>${a.title}</h3>
      <div class="tag-row">${tagsHtml(a)}</div>
      <p class="excerpt">${a.excerpt}</p>
      <div class="author-row"><span class="dot"></span>発信：${a.author}</div>
      <a class="read-btn" href="${a.url}" target="_blank" rel="noopener">元の記事を読む（note / X へ）→</a>
    </div>`;
  document.getElementById("closeBtn").addEventListener("click", closeModal);
  modalBg.classList.add("open");
}
function closeModal(){ modalBg.classList.remove("open"); }
modalBg.addEventListener("click", e=>{ if(e.target === modalBg) closeModal(); });

renderChips();
render();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).then(()=>{
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
